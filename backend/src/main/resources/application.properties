spring.application.name=medibook-api
server.port=8080

# ==== Supabase PostgreSQL connection ====
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/medibook}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==== JPA / Hibernate ====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==== CORS ====
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# ==== JWT ====
jwt.secret=${JWT_SECRET}
jwt.access-token-ms=1800000
jwt.refresh-token-ms=604800000

# ==== Logging ====
logging.level.org.springframework.security=INFO

# ==== Mail (FR-011) ====
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true